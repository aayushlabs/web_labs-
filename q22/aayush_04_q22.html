<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Lok Sewa Aayog Registration</title>
    <link rel="stylesheet" href="aayush_04_q22.css">
</head>
<body>

    <div class="form-container">

        <h2>Lok Sewa Aayog - Registration Form</h2>

        <form action="#" method="post">

            <label>Full Name:</label>
            <input type="text" name="fullname" required>

            <label>Date of Birth:</label>
            <input type="date" name="dob" required>

            <label>Gender:</label>
            <select name="gender">
                <option>Male</option>
                <option>Female</option>
                <option>Other</option>
            </select>

            <label>Citizenship Number:</label>
            <input type="text" name="citizenship" required>

            <label>Email:</label>
            <input type="email" name="email" required>

            <label>Phone Number:</label>
            <input type="text" name="phone" required>

            <label>Address:</label>
            <input type="text" name="address" required>

            <label>Post Applied For:</label>
            <select name="post">
                <option>Section Officer</option>
                <option>Nayab Subba</option>
                <option>Computer Officer</option>
            </select>

            <button type="submit">Register</button>

        </form>

    </div>

</body>
</html>
