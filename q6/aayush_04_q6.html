<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Image and iframe Tag</title>
</head>
<body>

    <h1>HTML Image Tag and iframe Tag</h1>
    <hr>

    <!-- Image Tag Section -->
    <h2>Image Tag</h2>

    <p>Image from local file:</p>
    <img src="profile.jpg" 
         alt="Aayush Adhikari" 
         width="200" 
         height="200"
         border="2"
         title="Aayush Adhikari">

    <br><br>

    <p>Image from URL:</p>
    <img src="https://www.tribhuvan-university.edu.np/wp-content/uploads/2021/01/TU-logo.png"
         alt="TU Logo"
         width="150"
         height="150"
         border="1"
         title="Tribhuvan University Logo">

    <hr>

    <!-- iframe Tag Section -->
    <h2>iframe Tag</h2>

    <p>Embedding Google Map using iframe:</p>
    <iframe 
        src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3532.0!2d85.3!3d27.7!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2zKathmandu!5e0!3m2!1sen!2snp!4v1"
        width="600" 
        height="400" 
        border="1"
        scrolling="no"
        title="Google Map of Kathmandu"
        allowfullscreen>
    </iframe>

    <br><br>

    <p>Embedding YouTube Video using iframe:</p>
    <iframe 
        width="600" 
        height="400" 
        src="https://www.youtube.com/embed/dQw4w9WgXcQ"
        title="YouTube Video"
        border="1"
        allowfullscreen>
    </iframe>

</body>
</html>
