<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Image and iframe Tag</title>
</head>
<body>

    <h1>Image Tag and iframe Tag</h1>
    <hr>

    <h2>Image Tag</h2>
    <img src="profile.jpg" alt="Aayush Adhikari" width="200" height="200">

    <hr>

    <h2>iframe Tag</h2>
    <iframe src="https://www.openstreetmap.org/export/embed.html?bbox=85.30%2C27.68%2C85.35%2C27.72&layer=mapnik" 
            width="500" 
            height="300">
    </iframe>

</body>
</html>
